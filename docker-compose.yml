# Jarr Local Development Stack
# Run: docker-compose up -d

services:
  mysql:
    image: mysql:8.0
    container_name: jarr-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: jarr_root
      MYSQL_DATABASE: jarr_db
      MYSQL_USER: jarr_user
      MYSQL_PASSWORD: jarr_pass
    volumes:
      - jarr_mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  jarr_mysql_data:
    driver: local
