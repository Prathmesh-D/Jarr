# Local Development Profile
# Uses Docker Compose MySQL instance

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/jarr_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: jarr_user
    password: jarr_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true

logging:
  level:
    com.jarr: DEBUG
    org.springframework.security: DEBUG
